# Run benchmark combinations on an already provisioned system using a matrix config file
# - Runs a script from .github/matrix/ that outputs TSV (header + data rows)
# - Converts TSV to matrix combinations and calls remote-benchmarks.yml for each
# - Continues on failure (fail-fast: false)

name: Matrix Benchmarks (Existing Server)

on:
  workflow_dispatch:
    inputs:
      matrix_file:
        description: 'Matrix Profile'
        required: true
        type: choice
        options:
        - gc-train-1000-100.sh
        - gc-train-heap-fail.sh

jobs:
  generate-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      combo_count: ${{ steps.build-matrix.outputs.combo_count }}
    steps:
    - uses: actions/checkout@v4

    - name: Build Matrix Combinations
      id: build-matrix
      run: |
        .github/scripts/build-matrix.sh ".github/matrix/${{ inputs.matrix_file }}"

  clear-server:
    runs-on: ubuntu-24.04
    env:
      SD: .github/scripts
      HOST: ${{ secrets.BENCHMARK_HOST }}
      USER: ${{ secrets.BENCHMARK_USER }}
    steps:
    - uses: actions/checkout@v4
    - name: Clear Remote Server
      run: |
        sudo chmod +x ${SD}/*
        ${SD}/setup-ssh-local.sh ${HOST} "${{ secrets.BENCHMARK_KEY }}"
        ${SD}/run-ssh-local.sh ${HOST} ${USER} ${SD} clear-test-server-remote

  run-benchmarks:
    needs: [generate-matrix, clear-server]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/remote-benchmarks.yml
    with:
      run_type: adhoc
      docker_image: ${{ matrix.docker_image }}
      run_label: ${{ matrix.run_label }}
      test_package: ${{ matrix.test_package }}
      test_class_list: ${{ matrix.test_class_list }}
      test_iterations: ${{ matrix.test_iterations }}
      scale_row_count: ${{ matrix.scale_row_count }}
      distribution: ${{ matrix.distribution }}
      test_device_addr: "<default>"
      config_options: ${{ matrix.config_options }}
    secrets: inherit
